<header>

</header>
<main>
<section class="form-section">
<h2>Nous contacter</h2>
<p>Pour toute question sur la reservation de salles,
contactez le service logistique.</p>
<form id="formContact" onsubmit="confirmerSoumission(
event)">
<label for="nom">Nom et prenom :</label>
<input type="text" id="nom" name="nom"
placeholder="Ex : Asma Benali" required>
<label for="email">Email :</label>
<input type="email" id="email" name="email"
placeholder="Ex : Asma@um5.ac.ma" required>
<label for="message">Message :</label>
<textarea id="message" name="message"
placeholder="Decrivez votre demande..."
rows="4" required></textarea>
<button type="submit" class="btn-primary">
Envoyer le message
</button>
</form>
</section>
</main>
<footer>
<p>Universite Mohammed V de Rabat-- 2025</p>
</footer>
<script src="js/main.js"></script>
</body>
</html>
